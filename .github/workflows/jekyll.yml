name: Jekyll site CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site the way GitHub Pages does
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
